services:
  api:
    image: golang:1.24
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    command: go run ./cmd/api

  test:
    image: golang:1.24
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    command: go test ./...

volumes:
  go-mod-cache:
